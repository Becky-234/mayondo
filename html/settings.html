<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Panel - Mayondo Wood & Furniture</title>
    <link rel="stylesheet" href="../css/settings.css">
</head>

<body>
    <div class="manager-container">
        <!-- Header Section -->
        <header class="manager-header">
            <div class="header-content">
                <h1>Manager Panel</h1>
                <p>Create and manage sales agent accounts</p>
            </div>
            <div class="user-info">
                <div class="user-name" id="manager-name">Manager</div>
                <div class="user-role">Manager</div>
            </div>
        </header>

        <!-- Alert Container -->
        <div id="global-alert"></div>

        <!-- Create Agent Card -->
        <div class="card">
            <h2>Create New Sales Agent</h2>

            <form id="create-agent-form" class="settings-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="agent-name">Full Name *</label>
                        <input id="agent-name" type="text" required placeholder="Enter agent's full name">
                    </div>

                    <div class="form-group">
                        <label for="agent-email">Email Address *</label>
                        <input id="agent-email" type="email" required placeholder="agent@mayondo.com">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="agent-region">Sales Region *</label>
                        <select id="agent-region" required>
                            <option value="">Select Region</option>
                            <option value="Kampala">Kampala Central</option>
                            <option value="Entebbe">Entebbe & Wakiso</option>
                            <option value="Jinja">Jinja & Eastern</option>
                            <option value="Mbarara">Mbarara & Western</option>
                            <option value="Gulu">Gulu & Northern</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="agent-phone">Phone Number *</label>
                        <input id="agent-phone" type="tel" required placeholder="+256 XXX XXX XXX">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="agent-password">Password *</label>
                        <div class="password-input-container">
                            <input id="agent-password" type="password" required placeholder="Create a password">
                            <button type="button" id="generate-password" class="btn-generate">Generate</button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar"></div>
                            <span class="strength-text">Password strength</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password *</label>
                        <input id="confirm-password" type="password" required placeholder="Confirm the password">
                        <div id="password-match" class="validation-message"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Create Sales Agent Account</button>
                    <button class="btn btn-secondary" type="button" id="reset-form">Reset Form</button>
                </div>
            </form>

            <!-- Credentials Display -->
            <div id="credentials-display" class="credentials-card">
                <h3>Agent Account Credentials</h3>
                <div class="credentials-info">
                    <div class="credential-item">
                        <span class="label">Full Name:</span>
                        <span id="display-name" class="value"></span>
                    </div>
                    <div class="credential-item">
                        <span class="label">Email:</span>
                        <span id="display-email" class="value"></span>
                    </div>
                    <div class="credential-item">
                        <span class="label">Password:</span>
                        <span id="display-password" class="value"></span>
                    </div>
                    <div class="credential-item">
                        <span class="label">Region:</span>
                        <span id="display-region" class="value"></span>
                    </div>
                </div>
                <div class="credentials-actions">
                    <button id="copy-credentials" class="btn btn-secondary">Copy Credentials</button>
                    <button id="print-credentials" class="btn btn-secondary">Print Credentials</button>
                    <button id="close-credentials" class="btn btn-secondary">Close</button>
                </div>
            </div>
        </div>

        <!-- Existing Agents List -->
        <div class="card">
            <div class="card-header">
                <h2>My Sales Agents</h2>
                <div class="search-box">
                    <input type="text" id="search-agents" placeholder="Search agents...">
                </div>
            </div>
            <div id="agents-list" class="user-list">
                <div class="empty-state">
                    <p>No sales agents registered yet</p>
                </div>
            </div>
        </div>
    </div>

    <script src="..javascript/settings.js"></script>
</body>

</html>
